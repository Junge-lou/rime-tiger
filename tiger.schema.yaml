# Rime schema: tiger
# encoding: utf-8
#
# 本文件是“单字”方案。
#
# 配置来源：
#   tiger_base.schema.yaml -> tiger.schema.yaml
#
# 底层使用全字集词典；常用字/全字集由 extended_char 开关过滤。
#
# 修改指南：
#   1. 只改单字方案：改本文件 / tiger.custom.yaml。
#   2. 虎码方案都要改：改 tiger_base.schema.yaml / tiger_base.custom.yaml。

__include: tiger_base.schema:/

schema:
  description: |
    虎码官方单字
    字典：全字集 99144 字；默认常用字过滤，Ctrl+H 切换全字集
    敲 ` 鍵進入拼音反查
  name: "虎码单字"
  schema_id: tiger

translator:
  dictionary: tiger.extended
